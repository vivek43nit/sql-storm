apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fkblitz.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fkblitz.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fkblitz.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fkblitz.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fkblitz.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: fkblitz-config
          configMap:
            name: {{ include "fkblitz.fullname" . }}
      containers:
        - name: fkblitz
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            - name: FKBLITZ_ADMIN_USER
              value: {{ .Values.app.adminUser | quote }}
            - name: FKBLITZ_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fkblitz.secretName" . }}
                  key: FKBLITZ_ADMIN_PASSWORD
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.app.springProfile | quote }}
            - name: FKBLITZ_CONFIG_DIR
              value: {{ .Values.app.configDir | quote }}
            - name: FKBLITZ_AUTH_USER_STORE
              value: {{ .Values.auth.userStore | quote }}
            {{- if .Values.redis.enabled }}
            - name: FKBLITZ_REDIS_ENABLED
              value: "true"
            - name: FKBLITZ_REDIS_HOST
              value: {{ include "fkblitz.redisHost" . | quote }}
            - name: FKBLITZ_REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            {{- if .Values.secret.redisPassword }}
            - name: FKBLITZ_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fkblitz.secretName" . }}
                  key: REDIS_PASSWORD
            {{- end }}
            {{- end }}
            {{- if .Values.oauth2.enabled }}
            - name: FKBLITZ_OAUTH2_ENABLED
              value: "true"
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fkblitz.secretName" . }}
                  key: OAUTH2_CLIENT_SECRET
            {{- end }}
            {{- range $key, $val := .Values.app.extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          volumeMounts:
            - name: fkblitz-config
              mountPath: {{ .Values.app.configDir }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
