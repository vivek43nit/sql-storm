name: Release

# Trigger: push a branch named release/v* (e.g. release/v2.1.0)
# The workflow bumps versions, generates a changelog, builds a multi-arch
# Docker image, pushes it to GHCR, and creates a GitHub Release.
on:
  push:
    branches:
      - "release/v*"

permissions:
  contents: write      # create tags and GitHub Release
  packages: write      # push to GHCR

jobs:
  # ── 1. Extract version from branch name ─────────────────────────────────────
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Parse version from branch
        id: parse
        run: |
          BRANCH="${GITHUB_REF_NAME}"           # e.g. release/v2.1.0
          VERSION="${BRANCH#release/v}"         # e.g. 2.1.0
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}"    >> "$GITHUB_OUTPUT"

  # ── 2. Bump version in pom.xml and package.json ─────────────────────────────
  bump:
    name: Bump versions
    runs-on: ubuntu-latest
    needs: version
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Bump backend version (pom.xml)
        run: |
          mvn -B versions:set -DnewVersion="${{ needs.version.outputs.version }}" \
              -DgenerateBackupPoms=false --no-transfer-progress
        working-directory: backend

      - name: Bump frontend version (package.json)
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version
        working-directory: frontend

      - name: Commit version bumps
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/pom.xml frontend/package.json frontend/package-lock.json
          git commit -m "chore(release): bump version to ${{ needs.version.outputs.version }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git push

  # ── 3. Generate changelog with git-cliff ────────────────────────────────────
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    needs: [version, bump]
    outputs:
      body: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.sha }}
          fetch-depth: 0

      - name: Generate changelog (since last tag)
        id: cliff
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGES.md

  # ── 4. Run full test suite ───────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [bump]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend — build, test, coverage
        run: mvn -B verify --no-transfer-progress
        working-directory: backend

      - name: Frontend — install, test
        run: |
          npm ci
          npm run test:coverage
        working-directory: frontend

  # ── 5. Build and push multi-arch Docker image to GHCR ───────────────────────
  docker:
    name: Docker (multi-arch)
    runs-on: ubuntu-latest
    needs: [version, bump, test]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - name: Set up QEMU (for ARM emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fkblitz
          tags: |
            type=raw,value=${{ needs.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 6. Create GitHub Release with git tag ───────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, bump, changelog, docker]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.sha }}
          fetch-depth: 0

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Create and push git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.tag }}" \
              -m "Release ${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "FkBlitz ${{ needs.version.outputs.tag }}"
          body_path: CHANGES.md
          draft: false
          prerelease: false
